<!DOCTYPE html>
<html>
    <head>
        <title>Tabelas</title>
        <style>
    .estilo {
      background-color: teal;
      color: rgb(14, 0, 53);
    }
        </style>
    </head>
    <body class="estilo">

        <h2>Conceitos sobre Formulario no HTML</h2>
        <p>Esta página possui um resumo sobre os conceitos do HTML!</p>

        <ul>
            <li>
                <a href="listas.html">Listas</a>
            </li>

            <li>
                <a href="tabela.html">Tabelas</a>
            </li>

            <li>
                <a href="imagem.html">Imagem</a>
            </li>

            <li>
                <a href="formulario.html">Formulario</a>
            </li>

            <h2>Formuário</h2>
            
            <form>
                <div>
                    <label for="nome">Nome: </label>
                    <input class="estilo" type="text">
                </div> <br>

                <div>
                    <label for="idade">Idade: </label>
                    <input class="estilo" type="number" min="0" max="120">
                </div> <br>

                <div>
                    <label for="usuario">Usuário: </label>
                    <input class="estilo" type="text">
                </div> <br>

                <div>
                    <label for="senha">Senha: </label>
                    <input class="estilo" type="password">
                </div> <br>

                <div>
                    <label for="data">Data do Evento: </label>
                    <input class="estilo" type="datetime-local">
                </div> <br>

                <div>
                    <label for="telefone">Telefone: </label>
                    <input class="estilo" type="tel" required placeholder="(XX)XXXXXXXXX">
                </div> <br>

                <div>
                    <label for="peso">Peso: </label>
                    <input class="estilo" type="number" min="0" max="120" step="0.5">
                </div> <br>

                <div>
                    <label for="volume">Volume: </label>
                    <input class="estilo" type="range" min="0" max="100" step="10">
                </div> <br>

                <div>
                    <fildset> <legend>Estado Civil</legend>
                    <label>
                    <input class="estilo" name="est_civil" type="radio" value="casado">Casado
                    </label>
                    <label>
                    <input class="estilo" name="est_civil" type="radio" value="solteiro">Solteiro
                    </label>
                    <label>
                    <input class="estilo" name="est_civil" type="radio" value="divorciado">Divorciado
                    </label>
                    </fildset>
                </div> <br>

                <div>
                    <button class="estilo" type="submit">Enviar</button>
                </div> <br>
            </form>
        </ul>
    </body>
</html>
